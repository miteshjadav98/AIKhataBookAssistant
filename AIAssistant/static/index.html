<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhataBook AI Assistant</title>
    <meta name="description" content="AI Voice Assistant for KhataBook Shopkeepers">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Auth View -->
        <div id="auth-view" class="view active glass-panel">
            <div class="auth-header">
                <div class="logo">
                    <i class="fa-solid fa-book-open-reader"></i>
                </div>
                <h1>KhataBook AI</h1>
                <p>Sign in to access your intelligent shop assistant</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary" id="login-btn">
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                <div id="auth-error" class="error-text hidden"></div>
            </form>
        </div>

        <!-- Chat View -->
        <div id="chat-view" class="view hidden glass-panel">
            <header class="chat-header">
                <div class="header-left">
                    <div class="logo-small">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div>
                        <h2>KhataBook AI</h2>
                        <span class="status-indicator"><span class="dot"></span> Online</span>
                    </div>
                </div>
                <div class="header-right">
                    <button id="toggle-tts-btn" class="icon-btn active" title="Toggle Text-to-Speech">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                    <button id="logout-btn" class="icon-btn" title="Logout">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </header>

            <main class="chat-history" id="chat-history">
                <div class="message system">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="bubble">
                        <p>Hello! I am your KhataBook AI Assistant. How can I help you manage your shop today?</p>
                        <p class="suggestions-label">Try asking:</p>
                        <div class="suggestions">
                            <button class="suggestion-chip">Show Mitesh's ledger</button>
                            <button class="suggestion-chip">What products are low in stock?</button>
                            <button class="suggestion-chip">Show today's sales</button>
                        </div>
                    </div>
                </div>
            </main>

            <div class="typing-indicator hidden" id="typing-indicator">
                <div class="dot-typing"></div>
            </div>

            <footer class="chat-input-area">
                <form id="chat-form">
                    <div class="input-wrapper">
                        <button type="button" id="mic-btn" class="icon-btn mic-btn" title="Hold to speak">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                        <input type="text" id="message-input" placeholder="Ask anything about your shop..." autocomplete="off">
                        <button type="submit" id="send-btn" class="icon-btn send-btn" title="Send message">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
            </footer>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
